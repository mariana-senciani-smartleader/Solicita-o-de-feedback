<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Modal shadow + background -->
  <rect x="0" y="0" width="680" height="620" rx="16" fill="white" filter="url(#shadow)" />
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="rgba(10,13,18,0.22)" />
    </filter>
    <!-- Clip for overflow hidden -->
    <clipPath id="modalClip">
      <rect x="0" y="0" width="680" height="620" rx="16" />
    </clipPath>
  </defs>

  <g clip-path="url(#modalClip)">
    <!-- Modal card -->
    <rect x="0" y="0" width="680" height="620" rx="16" fill="white" />

    <!-- ── Header ── -->
    <text x="24" y="42" font-size="18" font-weight="600" fill="#181D27">Detalhes do evento</text>
    <!-- Close button -->
    <rect x="624" y="16" width="32" height="32" rx="8" fill="transparent" />
    <!-- X icon -->
    <line x1="634" y1="26" x2="646" y2="38" stroke="#535862" stroke-width="2" stroke-linecap="round" />
    <line x1="646" y1="26" x2="634" y2="38" stroke="#535862" stroke-width="2" stroke-linecap="round" />
    <!-- Header divider -->
    <line x1="0" y1="64" x2="680" y2="64" stroke="#E9EAEB" stroke-width="1" />

    <!-- ── Body ── -->
    <!-- Title row -->
    <text x="24" y="106" font-size="20" font-weight="600" fill="#181D27">Daily Design</text>

    <!-- Edit button -->
    <rect x="584" y="84" width="32" height="32" rx="8" fill="white" stroke="#D5D7DA" stroke-width="1" />
    <!-- Pencil icon (simplified) -->
    <path d="M599 104 L605 98 L609 102 L603 108 Z" fill="none" stroke="#535862" stroke-width="1.6" stroke-linejoin="round" />
    <line x1="603" y1="107" x2="598" y2="109" stroke="#535862" stroke-width="1.6" stroke-linecap="round" />

    <!-- Delete button -->
    <rect x="624" y="84" width="32" height="32" rx="8" fill="white" stroke="#FDA29B" stroke-width="1" />
    <!-- Trash icon -->
    <rect x="633" y="96" width="14" height="12" rx="1.5" fill="none" stroke="#D92D20" stroke-width="1.6" />
    <line x1="630" y1="96" x2="650" y2="96" stroke="#D92D20" stroke-width="1.6" stroke-linecap="round" />
    <line x1="637" y1="93" x2="643" y2="93" stroke="#D92D20" stroke-width="1.6" stroke-linecap="round" />

    <!-- Date row -->
    <!-- Calendar icon -->
    <rect x="24" y="124" width="18" height="16" rx="2" fill="none" stroke="#535862" stroke-width="1.6" />
    <line x1="29" y1="122" x2="29" y2="127" stroke="#535862" stroke-width="1.6" stroke-linecap="round" />
    <line x1="37" y1="122" x2="37" y2="127" stroke="#535862" stroke-width="1.6" stroke-linecap="round" />
    <line x1="24" y1="130" x2="42" y2="130" stroke="#535862" stroke-width="1" />
    <text x="50" y="136" font-size="14" fill="#414651">terça-feira, 28 de abril de 2026</text>

    <!-- Time row -->
    <!-- Clock icon -->
    <circle cx="33" cy="162" r="9" fill="none" stroke="#535862" stroke-width="1.6" />
    <line x1="33" y1="157" x2="33" y2="162" stroke="#535862" stroke-width="1.6" stroke-linecap="round" />
    <line x1="33" y1="162" x2="37" y2="165" stroke="#535862" stroke-width="1.6" stroke-linecap="round" />
    <text x="50" y="167" font-size="14" fill="#414651">09:30 até 10:00</text>

    <!-- ── Link section ── -->
    <text x="24" y="204" font-size="13" font-weight="600" fill="#414651">Link compartilhado</text>
    <!-- Link input box -->
    <rect x="24" y="214" width="580" height="40" rx="8" fill="white" stroke="#D5D7DA" stroke-width="1" />
    <text x="36" y="239" font-size="14" fill="#414651">https://meet.google.com/gch-addc-dbs</text>
    <!-- External link button -->
    <rect x="612" y="214" width="32" height="40" rx="8" fill="white" stroke="#D5D7DA" stroke-width="1" />
    <path d="M621 233 L628 226 M625 225 L629 225 L629 229" fill="none" stroke="#535862" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Copy button -->
    <rect x="648" y="214" width="32" height="40" rx="8" fill="white" stroke="#D5D7DA" stroke-width="1" />
    <rect x="657" y="225" width="10" height="12" rx="2" fill="none" stroke="#535862" stroke-width="1.6" />
    <rect x="661" y="221" width="10" height="12" rx="2" fill="none" stroke="#535862" stroke-width="1.6" />

    <!-- Divider -->
    <line x1="24" y1="274" x2="656" y2="274" stroke="#E9EAEB" stroke-width="1" />

    <!-- ── Guests section ── -->
    <!-- People icon -->
    <circle cx="32" cy="298" r="5" fill="none" stroke="#414651" stroke-width="1.6" />
    <circle cx="41" cy="298" r="5" fill="none" stroke="#414651" stroke-width="1.6" />
    <path d="M22 312 Q22 306 32 306 Q37 306 40 309" fill="none" stroke="#414651" stroke-width="1.6" stroke-linecap="round" />
    <path d="M35 312 Q35 306 41 306 Q51 306 51 312" fill="none" stroke="#414651" stroke-width="1.6" stroke-linecap="round" />
    <text x="58" y="304" font-size="14" font-weight="600" fill="#181D27">3 Convidados</text>

    <!-- ── Guest 1 — Rafaela ── -->
    <circle cx="44" cy="344" r="18" fill="#F79009" />
    <text x="44" y="350" font-size="13" font-weight="700" fill="white" text-anchor="middle">R</text>
    <text x="70" y="339" font-size="12" font-weight="600" fill="#181D27">rafaela.monteiro@smartleader.com.br</text>
    <text x="70" y="355" font-size="11" fill="#717680">Organizador</text>

    <!-- ── Guest 2 — Guilherme ── -->
    <circle cx="384" cy="344" r="18" fill="#667085" />
    <text x="384" y="350" font-size="13" font-weight="700" fill="white" text-anchor="middle">G</text>
    <text x="410" y="339" font-size="12" font-weight="600" fill="#181D27">guilherme.farias@smartleader.com.br</text>
    <text x="410" y="355" font-size="11" fill="#717680">Convidado</text>

    <!-- ── Guest 3 — Isabela ── -->
    <circle cx="44" cy="400" r="18" fill="#98A2B3" />
    <text x="44" y="406" font-size="13" font-weight="700" fill="white" text-anchor="middle">I</text>
    <text x="70" y="395" font-size="12" font-weight="600" fill="#181D27">isabela.carvalho@smartleader.com.br</text>
    <text x="70" y="411" font-size="11" fill="#717680">Convidado</text>

    <!-- ── Footer divider ── -->
    <line x1="0" y1="440" x2="680" y2="440" stroke="#E9EAEB" stroke-width="1" />

    <!-- ── Solicitar feedback button ── -->
    <rect x="24" y="456" width="632" height="48" rx="10" fill="#1570EF" />
    <!-- Chat bubble icon -->
    <path d="M322 474 Q322 470 326 470 L350 470 Q354 470 354 474 L354 482 Q354 486 350 486 L332 486 L328 490 L328 486 Q322 486 322 482 Z" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round" />
    <text x="362" y="485" font-size="14" font-weight="600" fill="white">Solicitar feedback</text>
  </g>
</svg>
